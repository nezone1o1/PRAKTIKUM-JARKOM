<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cool Cat Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #eef2f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            width: 350px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .card-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .card-content {
            padding: 25px;
        }

        .badge {
            background: #ff4757;
            color: white;
            font-size: 11px;
            font-weight: 800;
            padding: 5px 12px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .title {
            font-size: 24px;
            color: #2f3542;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .description {
            font-size: 15px;
            color: #57606f;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2f3542 0%, #000000 100%);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: opacity 0.3s;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://blue.kumparan.com/image/upload/fl_progressive,fl_lossy,c_fill,f_auto,q_auto:best,w_640/v1634025439/01kjcm2e81rjw6n2a0d8vhspkr.jpg" 
             alt="Cool Cat" 
             class="card-image">
        
        <div class="card-content">
            <span class="badge">Elite Feline</span>
            <h2 class="title">Gubernur Anomali & Tombol Reset KALIMANTAN </h2>
            <p class="description">
                Masa Gubernur Make Mobil Ala Kadar nya, Jangan dong, Di jaga Marwah Provinsi Kita.
            </p>
            <a href="#" class="btn">Kenalan Yuk!</a>
        </div>
    </div>

</body>
</html>
